# Role taxonomy and matching rules. Edit freely; matching is case-insensitive
# substring on the job TITLE. Tiers are tried in priority order (1 first); a job
# is tagged with the first tier it matches.

tiers:
  - name: "RevOps"
    priority: 1
    include:
      - "revenue operations"
      - "rev ops"
      - "revops"
      - "revenue strategy & operations"
      - "revenue strategy and operations"

  - name: "Sales Ops"
    priority: 2
    include:
      - "sales operations"
      - "sales ops"
      - "gtm operations"
      - "go-to-market operations"
      - "go to market operations"
      - "commercial operations"

  - name: "GTM Strategy"
    priority: 3
    include:
      - "gtm strategy"
      - "go-to-market strategy"
      - "revenue strategy"
      - "sales strategy"
      - "commercial strategy"

  - name: "BI / Analytics"
    priority: 4
    include:
      - "business intelligence"
      - "bi analyst"
      - "bi developer"
      - "bi manager"
      - "tableau"

# Drop the job if any of these appear in the title (takes precedence over includes).
exclude:
  - "deal desk"
  - "deals desk"
  - "order management"
  - "intern"
  - "internship"
  - "graduate"
  - "apprentice"
  - "working student"
  - "sdr"
  - "bdr"
  - "account executive"
  - "engineer"

# Seniority is detected for tagging. drop_below optionally filters RevOps/Sales Ops
# tiers (1-2) below a level. Default off ("") - better to see an extra than miss one.
# Set to "manager" to hide sub-manager RevOps/Sales Ops roles. BI/Analytics is never gated.
drop_below: ""
seniority:
  director_plus: ["chief", " vp", "vice president", "head of", "director"]
  manager: ["manager", " lead", "principal", "staff"]
  ic: ["senior", "specialist", "analyst", "associate", "coordinator", "executive"]

# A job passes location if its location text contains any include term. Jobs with
# a blank location are kept and tagged "location unknown" (many remote roles are).
locations:
  include:
    - "london"
    - "united kingdom"
    - "uk"
    - "england"
    - "remote"
    - "emea"
    - "europe"
  exclude:
    - "united states"
    - ", us"
    - "(us)"
    - "us -"
    - "us,"
    - " us "
    - "u.s."
    - "usa"
    - "new york"
    - "san francisco"
    - "california"
    - "texas"
    - "chicago"
    - "boston"
    - "seattle"
    - "denver"
    - "austin"
    - "atlanta"
    - "toronto"
    - "canada"
    - "british columbia"
    - "ontario"
    - "quebec"
    - "alberta"
    - "can:"
    - "australia"
    - "sydney"
    - "melbourne"
    - "singapore"
    - "india"
